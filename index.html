<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norvège - Sénégal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="match">
            
            <div class="match-header">
                <div class="match-status">Groupe I</div>
                <div class="match-tournament">
                    <a href="https://www.fifa.com/fr/tournaments/mens/worldcup/canadamexicousa2026" target="_blank">
                        <img src="Medias/tournaments_fifa-world-cup-2026.football-logos.cc.svg" alt="">
                    </a>
                </div>
                <button id="theme">
                    <img src="Medias/new-moon.svg" alt="">
                </button>
            </div>

            <div class="match-content">

                <div class="column">
                    <div class="team">
                        <a href="https://www.fifa.com/fr/tournaments/mens/worldcup/canadamexicousa2026/teams/norway/squad" target="_blank">
                            <img class="team-logo" src="Medias/norway_norway-national-team.football-logos.cc.svg"/>
                            <h2 class="team-name">Norvège</h2>
                        </a>
                    </div>
                </div>

                <div class="column">
                    <div class="match-details">
                        <div class="match-date">23 Juin à <strong>00:00</strong></div>
                        <div class="match-score">
                            <span id="score1">-</span>
                            <span class="score-separation">:</span>
                            <span id="score2">-</span>
                        </div>
                        <button id="buts" class="buts">DEVINEZ LE SCORE</button>
                    </div>
                </div>

                <div class="column">
                    <div class="team">
                        <a href="https://www.fifa.com/fr/tournaments/mens/worldcup/canadamexicousa2026/teams/senegal/squad" target="_blank">
                            <img class="team-logo" src="Medias/senegal_senegal-national-team.football-logos.cc.svg"/>
                            <h2 class="team-name">Sénégal</h2>
                        </a>
                        
                    </div>
                </div>

            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
