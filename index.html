<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norvège - Sénégal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="match">
            
            <div class="match-header">
                <div class="match-status">En Direct</div>
                <div class="match-tournament"><img src="tournaments_fifa-world-cup-2026.football-logos.cc.svg" alt=""></div>
            </div>

            <div class="match-content">

                <div class="column">
                    <div class="team">
                        <img class="team-logo" src="norway_norway-national-team.football-logos.cc.svg"/>
                        <h2 class="team-name">Norvège</h2>
                    </div>
                </div>

                <div class="column">
                    <div class="match-details">
                        <div class="match-date">23 Juin à <strong>00:00</strong></div>
                        <div class="match-score">
                            <span id="score1">-</span>
                            <span class="match-score-divider">:</span>
                            <span id="score2">-</span>
                        </div>
                        <button id="buts" class="buts">DEVINEZ LE SCORE</button>
                    </div>
                </div>

                <div class="column">
                    <div class="team">
                        <img class="team-logo" src="senegal_senegal-national-team.football-logos.cc.svg"/>
                        <h2 class="team-name">Sénégal</h2>
                    </div>
                </div>

            </div>

        </div>
    </div>
</body>
    <script src="script.js"></script>
</html>
